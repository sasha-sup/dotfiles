# Terminator-like kitty setup based on the current synthwave profile
font_family JetBrainsMono Nerd Font
font_size 10.0

foreground #f0eff1
background #2a2139

cursor #72f1b8
cursor_text_color #ffffff

color0  #2a2139
color1  #f97e72
color2  #72f1b8
color3  #fede5d
color4  #6d77b3
color5  #c792ea
color6  #f772e0
color7  #fefefe
color8  #3d3052
color9  #f88414
color10 #72f1b8
color11 #fff951
color12 #36f9f6
color13 #e1acff
color14 #f92aad
color15 #fefefe

background_image /home/sasha/Pictures/wallpapers/win-xp-linux-blur.png
background_image_layout tiled
background_tint 0.97

scrollback_lines -1
copy_on_select clipboard
mouse_map right press ungrabbed
mouse_map right release ungrabbed paste_from_selection
confirm_os_window_close 0
enable_audio_bell no

hide_window_decorations yes
window_padding_width 0
draw_minimal_borders yes

enabled_layouts splits,tall,stack
tab_bar_edge top

map ctrl+shift+o launch --location=hsplit --cwd=current --copy-env
map ctrl+shift+e launch --location=vsplit --cwd=current --copy-env

map alt+up neighboring_window up
map alt+down neighboring_window down
map alt+left neighboring_window left
map alt+right neighboring_window right

map ctrl+page_down next_tab
map ctrl+page_up previous_tab
