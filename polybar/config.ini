[colors]
background = #1a1a2e
background-alt = #16213e
foreground = #e0e0e0
foreground-alt = #888888
primary = #0088CC
alert = #FF0000
green = #00C853
yellow = #FFD600
cyan = #00BCD4

[bar/main]
monitor = ${env:MONITOR:}
width = 100%:-20
height = 22pt
offset-x = 10
offset-y = 6
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0
border-color = #00000000

padding-left = 0
padding-right = 2

module-margin = 1

separator = │
separator-foreground = ${colors.foreground-alt}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

modules-left = i3
modules-center = date
modules-right = network bluetooth cpu temperature fan memory battery volume weather

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2

wm-restack = i3
override-redirect = true

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true

label-focused = %index%
label-focused-background = ${colors.primary}
label-focused-foreground = #ffffff
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-padding = 1
label-unfocused-foreground = ${colors.foreground-alt}

label-visible = %index%
label-visible-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-foreground = #ffffff
label-urgent-padding = 1

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.cyan}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 5
format-prefix = "󰘚 "
format-prefix-foreground = ${colors.cyan}
label = %percentage_used%%

[module/temperature]
type = internal/temperature
thermal-zone = 0
base-temperature = 30
warn-temperature = 75

format-prefix = "󱃃 "
format-prefix-foreground = ${colors.yellow}
label = %temperature-c%

format-warn-prefix = "󰸁 "
format-warn-prefix-foreground = ${colors.alert}
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
label = "󰃶 %date%  󰥔 %time%"
label-foreground = ${colors.foreground}

[module/volume]
type = internal/pulseaudio
use-ui-max = false

format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.green}
label-volume = %percentage%%

format-muted-prefix = "󰖁 "
format-muted-prefix-foreground = ${colors.alert}
label-muted = muted
label-muted-foreground = ${colors.foreground-alt}

click-right = pavucontrol

[module/battery]
type = custom/script
exec = cat /tmp/bat_status 2>/dev/null || echo ""
interval = 10
label = %output%
label-foreground = ${colors.foreground}

[module/fan]
type = custom/script
exec = cat /tmp/fan_speed 2>/dev/null || echo ""
interval = 10
format-prefix = "󰈐 "
format-prefix-foreground = ${colors.cyan}
label = %output% RPM

[module/weather]
type = custom/script
exec = cat /tmp/get-my-weather.txt 2>/dev/null || echo ""
interval = 300
label = %output%
label-foreground = ${colors.foreground}

[module/bluetooth]
type = custom/script
exec = bluetoothctl show 2>/dev/null | grep -q "Powered: yes" && echo "󰂯" || echo "󰂲"
interval = 5
label = %output%
label-foreground = ${colors.cyan}
click-left = blueman-manager

[module/network]
type = custom/script
exec = nmcli -t -f active,ssid dev wifi 2>/dev/null | grep '^yes' | cut -d: -f2 || echo "off"
interval = 5
format-prefix = "󰖩 "
format-prefix-foreground = ${colors.green}
label = %output%
click-left = ~/.config/polybar/wifi-menu.sh
click-right = nm-connection-editor

[settings]
screenchange-reload = true
pseudo-transparency = false
